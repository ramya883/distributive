---
# Streamlit Application Service - NodePort for external access
apiVersion: v1
kind: Service
metadata:
  name: distributive-service
  labels:
    app: distributive
spec:
  type: NodePort
  selector:
    app: distributive
  ports:
    - name: streamlit
      protocol: TCP
      port: 8501
      targetPort: 8501
      nodePort: 30007

---
# MongoDB Service - ClusterIP for internal pod communication
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  labels:
    app: distributive
spec:
  type: ClusterIP
  selector:
    app: distributive
  ports:
    - name: mongodb
      protocol: TCP
      port: 27017
      targetPort: 27017
